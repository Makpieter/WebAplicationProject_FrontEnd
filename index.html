<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DnD Q&A Database</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#" data-route="home">DnD Q&amp;A Database</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" data-route="home">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-route="example">Forum</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center">
                <!-- Profile link — shown only when logged in -->
                <li class="nav-item" id="profile-nav-item" style="display:none;">
                    <a class="nav-link" href="#" data-route="profile">
                        <i class="bi bi-person-circle me-1"></i>
                        <span id="nav-username"></span>
                    </a>
                </li>
                <!-- Admin/Mod link — shown only for admin/moderator -->
                <li class="nav-item" id="admin-nav-item" style="display:none;">
                    <a class="nav-link text-danger fw-bold" href="#" data-route="admin">
                        <i class="bi bi-shield-lock-fill me-1"></i>Admin
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="logoutBtn">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div id="app-container">
        <div class="text-center">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 text-center">
    <div class="container"><p>DnD Q&amp;A Database</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Local storage database -->
<script src="example/mock-api.js"></script>

<!-- Core scripts -->
<script src="js/api.js"></script>
<script src="js/components/table.js"></script>
<script src="js/pages/Landing.js"></script>
<script src="js/components/form.js"></script>
<script src="js/components/modal.js"></script>

<!-- Pages -->
<script src="js/pages/Landing.js"></script>
<script src="js/pages/Register.js"></script>
<script src="js/pages/home.js"></script>
<script src="js/pages/login.js"></script>
<script src="js/pages/list.js"></script>
<script src="js/pages/details.js"></script>
<script src="js/pages/edit.js"></script>
<script src="js/pages/profile.js"></script>
<script src="js/pages/admin.js"></script>
<script src="example/example.js"></script>

<!-- App router (must be last) -->
<script src="js/app.js"></script>

<script>
// Update navbar after login state is known
document.addEventListener('DOMContentLoaded', () => {
    function updateNavbar() {
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        const username   = localStorage.getItem('loggedInUser') || '';
        const role       = localStorage.getItem('userRole') || 'USER';
        const canManage  = username === 'admin' || role === 'ADMIN' || role === 'MODERATOR';

        document.getElementById('profile-nav-item').style.display = isLoggedIn ? 'block' : 'none';
        document.getElementById('admin-nav-item').style.display   = (isLoggedIn && canManage) ? 'block' : 'none';
        document.getElementById('nav-username').textContent        = username;
    }

    updateNavbar();
    // Re-run on storage changes (handles login/logout)
    window.addEventListener('storage', updateNavbar);
    // Also re-run every time a nav link is clicked
    document.querySelectorAll('[data-route]').forEach(el => {
        el.addEventListener('click', () => setTimeout(updateNavbar, 100));
    });
});
</script>
</body>
</html>
