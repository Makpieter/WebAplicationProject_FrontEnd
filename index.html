<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Application Starter</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#" data-route="home">DnD Q&A Database</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#" data-route="home">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-route="list">Questions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-route="example">Example</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main content container -->
<div class="container mt-4">
    <div id="app-container">
        <!-- Content will be loaded here by JavaScript -->
        <div class="text-center">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="mt-5 py-3 text-center">
    <div class="container">
        <p>DnD Q&A Database</p>
    </div>
</footer>

<!-- Bootstrap JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<!-- SweetAlert2 for better dialogs -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Mock API (for example only) -->
<script src="example/mock-api.js"></script>

<!-- Application Scripts -->
<script src="js/api.js"></script>
<script src="js/components/table.js"></script>
<script src="js/components/form.js"></script>
<script src="js/components/modal.js"></script>
<script src="js/pages/home.js"></script>
<script src="js/pages/list.js"></script>
<script src="js/pages/details.js"></script>
<script src="js/pages/edit.js"></script>
<script src="example/example.js"></script>
<script src="js/app.js"></script>
</body>
</html>
